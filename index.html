                        translationEn: "The honest and trustworthy merchant will be with the prophets, the truthful, and the martyrs.",
                        translationBn: "সৎ ও বিশ্বস্ত ব্যবসায়ী (আখেরাতে) নবী, সিদ্দিক ও শহীদগণের সঙ্গী হবেন।",
                        refEn: "Jami` at-Tirmidhi 1209",
                        refBn: "জামে আত-তিরমিজি, হাদিস নং ১২০৯"
                    },
                    {
                        arabic: "مَنْ غَشَّنَا فَلَيْسَ مِنَّا",
                        translationEn: "Whoever deceives us is not one of us.",
                        translationBn: "যে ব্যক্তি আমাদের সাথে প্রতারণা করে (বা ধোঁকা দেয়), সে আমাদের দলভুক্ত নয়।",
                        refEn: "Sahih Muslim 101",
                        refBn: "সহীহ মুসলিম, হাদিস নং ১০১"
                    }
                ]
            }
        ];

        // 2. Language Toggling Function
        let currentLang = 'en';
        
        function setLanguage(lang) {
            currentLang = lang;
            const body = document.getElementById('app-body');
            const btnEn = document.getElementById('btn-en');
            const btnBn = document.getElementById('btn-bn');

            if (lang === 'en') {
                body.classList.remove('bn-mode');
                body.classList.add('en-mode');
                btnEn.classList.replace('text-emerald-900', 'bg-emerald-900');
                btnEn.classList.add('text-cream', 'shadow-sm');
                btnBn.classList.replace('bg-emerald-900', 'transparent');
                btnBn.classList.replace('text-cream', 'text-emerald-900');
                btnBn.classList.remove('shadow-sm');
                document.getElementById('search-input').placeholder = "Search a topic (e.g., Business, Manners)...";
            } else {
                body.classList.remove('en-mode');
                body.classList.add('bn-mode');
                btnBn.classList.replace('text-emerald-900', 'bg-emerald-900');
                btnBn.classList.add('text-cream', 'shadow-sm');
                btnEn.classList.replace('bg-emerald-900', 'transparent');
                btnEn.classList.replace('text-cream', 'text-emerald-900');
                btnEn.classList.remove('shadow-sm');
                document.getElementById('search-input').placeholder = "একটি বিষয় খুঁজুন (যেমন: ব্যবসা, শিষ্টাচার)...";
            }
        }

        // 3. Search Functionality
        const searchInput = document.getElementById('search-input');
        const resultsContainer = document.getElementById('search-results-container');

        searchInput.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') handleSearch();
        });

        function fillSearch(term) {
            searchInput.value = term;
            handleSearch();
        }

        function handleSearch() {
            const query = searchInput.value.toLowerCase().trim();
            if (!query) return;

            const result = database.find(item => 
                item.keywords.some(kw => query.includes(kw) || kw.includes(query))
            );

            if (result) {
                renderResult(result);
            } else {
                renderNotFound();
            }
            
            lucide.createIcons();
            resultsContainer.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        // 4. Render Multiple Verses and Hadiths Dynamically
        function renderResult(data) {
            
            // Build Quranic Evidences HTML
            const quranHTML = data.quranicEvidences.map((q, index) => `
                <div class="${index > 0 ? 'mt-10 pt-10 border-t border-gold/30' : ''}">
                    <div class="flex flex-col md:flex-row items-start md:items-center justify-between mb-6 gap-2">
                        <span class="text-gold tracking-widest text-xs uppercase font-semibold">Evidence ${index + 1}</span>
                        <span class="text-sm font-light opacity-80 en-text bg-emerald-800/50 px-3 py-1 rounded-full">${q.refEn}</span>
                        <span class="text-sm font-light opacity-80 bn-text font-hind bg-emerald-800/50 px-3 py-1 rounded-full">${q.refBn}</span>
                    </div>
                    
                    <div class="text-right mb-8">
                        <p class="font-amiri text-3xl md:text-5xl leading-[2.5] text-cream">${q.arabic}</p>
                    </div>

                    <div class="grid md:grid-cols-2 gap-8">
                        <div>
                            <h4 class="text-gold text-xs uppercase tracking-widest mb-2 border-b border-gold/20 pb-2 inline-block">English Translation</h4>
                            <p class="font-inter font-light text-lg leading-relaxed text-cream/90">"${q.translationEn}"</p>
                        </div>
                        <div>
                            <h4 class="text-gold text-xs uppercase tracking-widest mb-2 border-b border-gold/20 pb-2 font-hind inline-block">বাংলা অনুবাদ</h4>
                            <p class="font-hind text-xl font-light leading-relaxed text-cream/90">"${q.translationBn}"</p>
                        </div>
                    </div>
                </div>
            `).join('');

            // Build Hadith Evidences HTML
            const hadithHTML = data.hadithEvidences.map((h, index) => `
                <div class="${index > 0 ? 'mt-10 pt-10 border-t border-gold/20' : ''}">
                    <div class="text-center max-w-4xl mx-auto mb-8 space-y-6">
                        <p class="font-amiri text-2xl md:text-4xl leading-[2.2] text-emerald-900">${h.arabic}</p>
                        
                        <div class="space-y-4 pt-4">
                            <p class="font-inter text-gray-700 text-lg leading-relaxed">"${h.translationEn}"</p>
                            <p class="font-hind text-gray-800 text-xl leading-relaxed">"${h.translationBn}"</p>
                        </div>
                    </div>

                    <div class="flex justify-center">
                        <span class="inline-flex items-center gap-2 px-4 py-2 bg-cream-dark text-emerald-900 rounded-full text-sm font-medium border border-gold/20">
                            <i data-lucide="bookmark" class="w-4 h-4 text-gold"></i>
                            <span class="en-text">${h.refEn}</span>
                            <span class="bn-text font-hind">${h.refBn}</span>
                        </span>
                    </div>
                </div>
            `).join('');


            // Inject Final HTML into the container
            resultsContainer.innerHTML = `
                <div class="mb-10 text-center animate-fade-in">
                    <span class="text-sm font-medium tracking-widest text-gold uppercase mb-2 block">
                        <span class="en-text">Authentic Islamic Guidance</span>
                        <span class="bn-text font-hind">নির্ভরযোগ্য ইসলামী দিকনির্দেশনা</span>
                    </span>
                    <h2 class="font-playfair text-3xl md:text-5xl font-bold text-emerald-900 en-text mb-2">${data.titleEn}</h2>
                    <h2 class="font-hind text-3xl md:text-5xl font-bold text-emerald-900 bn-text mb-2">${data.titleBn}</h2>
                </div>

                <!-- Overview Section -->
                <article class="bg-white rounded-3xl p-8 md:p-10 shadow-sm border border-gold/20 mb-10 relative overflow-hidden">
                    <div class="absolute top-0 left-0 w-2 h-full bg-gold"></div>
                    <h3 class="font-playfair text-xl font-semibold mb-4 flex items-center gap-2 text-emerald-900">
                        <i data-lucide="book-open" class="text-gold w-5 h-5"></i> 
                        <span class="en-text">Overview & Explanation</span>
                        <span class="bn-text font-hind">সারসংক্ষেপ ও ব্যাখ্যা</span>
                    </h3>
                    <p class="text-gray-700 leading-relaxed font-inter text-justify en-text text-lg">${data.summaryEn}</p>
                    <p class="font-hind text-gray-700 leading-relaxed text-justify text-xl bn-text">${data.summaryBn}</p>
                </article>

                <!-- Quranic Evidences Wrapper -->
                <article class="bg-emerald-900 text-cream rounded-3xl p-8 md:p-12 shadow-lg mb-10">
                    <div class="flex items-center gap-3 mb-8 pb-6 border-b-2 border-gold">
                        <i data-lucide="book" class="w-8 h-8 text-gold"></i> 
                        <h3 class="font-playfair text-2xl text-gold">
                            <span class="en-text">Verses from the Holy Quran</span>
                            <span class="bn-text font-hind">পবিত্র কুরআনের আয়াতসমূহ</span>
                        </h3>
                    </div>
                    
                    ${quranHTML}
                    
                </article>

                <!-- Hadith Evidences Wrapper -->
                <article class="bg-white rounded-3xl p-8 md:p-12 shadow-sm border border-gold/20 relative mb-10">
                    <div class="absolute top-0 right-10 w-12 h-16 bg-gold/10 rounded-b-full flex items-center justify-center">
                        <i data-lucide="quote" class="text-gold w-6 h-6"></i>
                    </div>
                    
                    <div class="flex items-center gap-3 mb-10 pb-6 border-b-2 border-gold/20">
                        <h3 class="font-playfair text-2xl font-semibold text-emerald-900">
                            <span class="en-text">Authentic Hadiths (Sunnah)</span>
                            <span class="bn-text font-hind">সহীহ হাদিসসমূহ (সুন্নাহ)</span>
                        </h3>
                    </div>

                    ${hadithHTML}

                </article>
            `;
        }

        function renderNotFound() {
            resultsContainer.innerHTML = `
                <div class="text-center py-20 bg-white rounded-3xl border border-gold/20 shadow-sm">
                    <i data-lucide="search-x" class="w-16 h-16 text-gold mx-auto mb-4 opacity-50"></i>
                    <h2 class="font-playfair text-2xl text-emerald-900 mb-2">
                        <span class="en-text">No exact results found</span>
                        <span class="bn-text font-hind">কোনো ফলাফল পাওয়া যায়নি</span>
                    </h2>
                    <p class="text-gray-500 font-inter">
                        <span class="en-text">Try searching for "Business", "Manners", or "Riba".</span>
                        <span class="bn-text font-hind">"Business", "Manners" অথবা "Riba" লিখে খোঁজ করার চেষ্টা করুন।</span>
                    </p>
                </div>
            `;
        }

        // Initialize icons on page load
        lucide.createIcons();

        // Load a default topic so page isn't empty
        window.onload = () => {
            fillSearch('Manners');
        };
    </script>
</body>
</html>
